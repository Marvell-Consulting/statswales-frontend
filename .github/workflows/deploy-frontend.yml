name: Deploy Frontend

on:
  workflow_dispatch:
    inputs:
      imageTag:
        description: 'Docker Image Tag'
        required: false # Optional, uses commit SHA if not provided

  workflow_run:
    workflows: ['Docker Build and Push']
    types:
      - completed

  # push:
  #   branches:
  #     - main

  pull_request:
    branches:
      - main # Runs when a PR is opened or updated against main

jobs:
  deploy:
    if: ${{ (github.event.workflow_run.conclusion == 'success') || (github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    steps:
      - name: Set Image Tag (from commit SHA)
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          IMAGE_TAG="ghcr.io/marvell-consulting/statswales-frontend:$SHORT_SHA"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

      - name: Debug Output - Verify Image Tag
        run: |
          echo "Commit SHA: $GITHUB_SHA"
          echo "Short SHA: $SHORT_SHA"
          echo "Computed Image Tag: $IMAGE_TAG"

      - name: Trigger Azure DevOps Pipeline (Terraform)
        run: |
          echo "Triggering Azure DevOps with Image Tag: ${{ env.IMAGE_TAG }}"
          curl -u ":${{ secrets.AZURE_DEVOPS_PAT }}" \
            -X POST "https://dev.azure.com/MarvellConsulting/StatsWales/_apis/build/builds?api-version=6.0" \
            -H "Content-Type: application/json" \
            -d '{
              "definition": { "id": 8 },
              "parameters": {
                "FRONTEND_APP_IMAGE": "'"${{ env.IMAGE_TAG }}"'"
              },
              "reason": "Manual",
              "sourceBranch": "refs/heads/main"
            }'
